# .github/workflows/scheduled-rebuild.yml
# Cotygodniowy rebuild obrazów — łapie najnowsze łatki bezpieczeństwa
# (Ubuntu apt / UBI9 dnf) oraz nowe wersje opencode CLI.
# Buduje dwa warianty: Ubuntu 24.04 i Red Hat UBI 9.

name: Weekly scheduled rebuild

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  rebuild:
    strategy:
      matrix:
        variant: [ubuntu, ubi9]
      fail-fast: false
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Podman and QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y podman podman-docker qemu-user-static

      - name: Log in to GHCR
        uses: redhat-actions/podman-login@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (no cache)
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: |
            ${{ matrix.variant == 'ubi9' && 'ubi9' || 'latest' }}
            ${{ matrix.variant == 'ubi9' && format('weekly-{0}-ubi9', github.run_number) || format('weekly-{0}', github.run_number) }}
          containerfiles: |
            ${{ matrix.variant == 'ubi9' && './Containerfile.ubi9' || './Containerfile' }}
          platforms: linux/amd64, linux/arm64

      - name: Push to GHCR
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: ${{ env.REGISTRY }}

      - name: Run Trivy scan
        if: matrix.variant == 'ubuntu'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH


